<!-- Rastgele Siteye Git Butonu -->
<div style="text-align: center; margin: 60px 0 40px;">
    <button onclick="rastgeleSiteyeGit()" 
            style="background: linear-gradient(135deg, #d32f2f, #f44336); 
                   color: white; 
                   padding: 18px 45px; 
                   font-size: 19px; 
                   font-weight: 700; 
                   border: none; 
                   border-radius: 50px; 
                   cursor: pointer; 
                   box-shadow: 0 10px 25px rgba(211, 47, 47, 0.4);">
        🌍 Rastgele Siteye Git
    </button>
</div>

<script>
// Rastgele popüler siteler listesi (istediğin kadar ekleyebilirsin)
const randomSiteler = [
    "https://www.google.com",
    "https://www.youtube.com",
    "https://www.wikipedia.org",
    "https://www.reddit.com",
    "https://www.instagram.com",
    "https://www.twitter.com",
    "https://www.tiktok.com",
    "https://www.amazon.com",
    "https://www.netflix.com",
    "https://www.github.com",
    "https://www.bbc.com",
    "https://www.cnn.com",
    "https://www.imdb.com",
    "https://www.spotify.com",
    "https://www.pinterest.com"
];

function rastgeleSiteyeGit() {
    const rastgeleIndex = Math.floor(Math.random() * randomSiteler.length);
    const secilenSite = randomSiteler[rastgeleIndex];
    
    // Yeni sekmede açsın
    window.open(secilenSite, "_blank");
}
</script>
